kind = "web"
previewPath = "/"
title = "Kimble Inc"
version = "1.0.0"
id = "artifacts/kimble-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25080

[services.development]
run = "pnpm --filter @workspace/kimble-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kimble-website", "run", "build" ]
publicDir = "artifacts/kimble-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25080"
BASE_PATH = "/"
